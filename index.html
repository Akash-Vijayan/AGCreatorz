
<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AG Viztek Studio — Premium Digital Studio</title>
    <meta name="description" content="AG Viztek Studio — Crafting high-performance web engineering and cinematic brand narratives." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'], 
              serif: ['Playfair Display', 'serif'],
              script: ['Pinyon Script', 'cursive'],
            },
            colors: {
              brandPrimary: {
                DEFAULT: '#824D69',
                light: '#DFB6B2',
                dark: '#522959',
              },
              brandSurface: {
                light: '#FAE5D8',
                dark: '#180018',
              },
              brandCard: {
                light: '#FFFFFF',
                dark: '#2A114B',
              }
            },
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.25",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
        "react/": "https://aistudiocdn.com/react@^19.2.1/",
        "react": "https://aistudiocdn.com/react@^19.2.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
  
  <!-- Lenis Smooth Scroll -->
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.18/dist/lenis.css">
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const lenis = new Lenis({
        autoRaf: true,
        anchors: true,
        duration: 1.2,
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      });
      window.lenis = lenis;
    });
  </script>
</head>
  <body class="selection:bg-brandPrimary selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
